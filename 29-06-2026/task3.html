<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Pizza Order Calculator</title>
    <link rel="stylesheet" href="pizza.css">
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial;
        background: #f6ecd7;
    }

    .container {
        width: 90%;
        margin: auto;
        display: flex;
        justify-content: space-between;
        padding: 50px;
    }

    .left {
        width: 50%;
    }

    .right {
        width: 35%;
    }

    h1 {
        font-size: 40px;
    }

    select {
        width: 450px;
        padding: 12px;
        font-size: 20px;
    }

    .sizes {
        margin-top: 20px;
    }

    .sizes label {
        border: 2px solid black;
        padding: 12px 40px;
        margin-right: 10px;
        cursor: pointer;
        font-size: 20px;
    }

    input[type="radio"]:checked+label {
        background: #e36b4e;
        color: white;
    }

    .top {
        display: grid;
        grid-template-columns: repeat(2, 200px);
        gap: 20px;
        margin-top: 20px;
    }

    .top label {
        font-size: 24px;
    }

    .receipt {
        background: white;
        padding: 30px;
        box-shadow: 0 0 10px gray;
    }

    .receipt p {
        font-size: 28px;
    }

    button {
        margin-top: 30px;
        padding: 15px 40px;
        background: green;
        color: white;
        border-radius: 40px;
        font-size: 22px;
        cursor: pointer;
    }
</style>

<body>

    <div class="container">

        <!-- LEFT -->
        <div class="left">

            <h1> BUILD YOUR SMART PIZZA</h1>

            <h2>CRUST</h2>
            <select id="crust">
                <option value="thin"> Thin ($8.00)</option>
                <option value="regular"> Regular ($10.00)</option>
                <option value="stuffed"> Stuffed ($12.00)</option>
            </select>

            <h2>SIZE</h2>

            <div class="sizes">
                <input type="radio" name="pizzaSize" value="small" id="small">
                <label for="small">Small</label>

                <input type="radio" name="pizzaSize" value="medium" id="medium" checked>
                <label for="medium">Medium</label>

                <input type="radio" name="pizzaSize" value="large" id="large">
                <label for="large">Large</label>
            </div>

            <h2>TOPPINGS</h2>

            <div class="top">

                <label><input type="checkbox" name="topping" value="cheese"> Cheese</label>
                <label><input type="checkbox" name="topping" value="mushrooms"> Mushrooms</label>

                <label><input type="checkbox" name="topping" value="peppers"> Peppers</label>
                <label><input type="checkbox" name="topping" value="pepperoni"> Pepperoni</label>

                <label><input type="checkbox" name="topping" value="onions"> Onions</label>
                <label><input type="checkbox" name="topping" value="sausage"> Chicken</label>

            </div>

        </div>


        <!-- RIGHT -->

        <div class="right">

            <h1>🧾 YOUR RECEIPT</h1>

            <div class="receipt">

                <h2 id="pizzaTitle">PIZZA</h2>

                <hr>

                <p>Base: <span id="basePrice">$0</span></p>

                <p>Toppings: <span id="toppingPrice">$0</span></p>

                <p>Subtotal: <span id="subTotal">$0</span></p>

                <p>Discount: <span>10%</span></p>

                <hr>

                <h2>FINAL TOTAL</h2>

                <h1 id="totalPrice">$0</h1>

            </div>

            <button onclick="placeOrder()">PLACE ORDER</button>

        </div>

    </div>

</body>

<script>
    const MENU = {
        Size: {
            thin: 8.00,
            regular: 10.00,
            stuffed: 12.00
        },

        Lenght: {
            small: 1.0,
            medium: 1.5,
            large: 2.0
        },

        toppings: {
            cheese: 1.0,
            pepperoni: 1.0,
            mushrooms: 1.0,
            onions: 1.0,
            peppers: 1.0,
            sausage: 1.0
        }
    };


    const calculatePrice = (Size, Lenght) => {

        const Sizeprize = MENU.Size[Size] || MENU.Size.regular;

        const Lenghtprize = MENU.Lenght[Lenght] || MENU.Lenght.medium;

        return Sizeprize * Lenghtprize;
    };


    const calculateToppingsPrice = (toppings) => {

        return toppings.reduce((total, topping) => {

            return total + MENU.toppings[topping];

        }, 0);
    };


    // Higher Order Function

    const calculateTotalPrice = (calculatePrice, calculateToppingsPrice) => {

        return (Size, Lenght, toppings) => {

            const basePrice = calculatePrice(Size, Lenght);

            const toppingsPrice = calculateToppingsPrice(toppings);

            return basePrice + toppingsPrice;
        };
    };


    const finalPrice = calculateTotalPrice(
        calculatePrice,
        calculateToppingsPrice
    );


    // Button Function

    function placeOrder() {

        let Size = document.getElementById("crust").value;

        let Lenght = document.querySelector(
            "input[name='pizzaSize']:checked"
        ).value;


        let checkedItems = document.querySelectorAll(
            "input[name='topping']:checked"
        );


        let toppings = [];


        checkedItems.forEach((item) => {

            toppings.push(item.value);

        });


        let base = calculatePrice(Size, Lenght);

        let top = calculateToppingsPrice(toppings);

        let subtotal = base + top;

        let discount = subtotal * 0.10;

        let total = subtotal - discount;


        document.getElementById("pizzaTitle").innerText =
            Lenght.toUpperCase() + " " +
            Size.toUpperCase() + " CRUST PIZZA";

        document.getElementById("basePrice").innerText =
            "$" + base.toFixed(2);

        document.getElementById("toppingPrice").innerText =
            "$" + top.toFixed(2);

        document.getElementById("subTotal").innerText =
            "$" + subtotal.toFixed(2);

        document.getElementById("totalPrice").innerText =
            "$" + total.toFixed(2);
    }</script>

</html>
