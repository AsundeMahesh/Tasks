<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: linear-gradient(120deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .container {
        width: 100%;
        max-width: 700px;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, .2);
    }

    .hide {
        display: none;
    }

    h1,
    h2,
    h3 {
        margin-bottom: 20px;
    }

    p {
        margin-bottom: 15px;
    }

    button {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        background: #0077ff;
        color: white;
        transition: .3s;
    }

    button:hover {
        background: #0056d6;
    }

    .buttons {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
        flex-wrap: wrap;
        gap: 10px;
    }

    .option {
        border: 2px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        margin: 10px 0;
        cursor: pointer;
        transition: .3s;
    }

    .option:hover {
        background: #f0f7ff;
    }

    .selected {
        background: #0077ff;
        color: white;
        border-color: #0077ff;
    }

    .progress-bar {
        width: 100%;
        height: 10px;
        background: #ddd;
        border-radius: 20px;
        margin: 15px 0;
        overflow: hidden;
    }

    #progressFill {
        height: 100%;
        width: 0%;
        background: green;
        transition: .3s;
    }

    @media(max-width:600px) {

        .card {
            padding: 20px;
        }

        .buttons {
            flex-direction: column;
        }

        button {
            width: 100%;
        }

    }
</style>

<body>

    <div class="container">

        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="card">
            <h1>Interactive Quiz Application</h1>
            <p>Test your JavaScript knowledge with 10 multiple-choice questions.</p>

            <h3>Total Questions : 10</h3>

            <button id="startBtn">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->

        <div id="quizScreen" class="card hide">

            <div class="top">

                <div id="progress">Question 1 of 10</div>

                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>

            </div>

            <h2 id="question"></h2>

            <div id="options"></div>

            <div class="buttons">

                <button id="prevBtn">Previous</button>

                <button id="nextBtn">Next</button>

                <button id="submitBtn" class="hide">Submit Quiz</button>

            </div>

        </div>

        <!-- Result Screen -->

        <div id="resultScreen" class="card hide">

            <h1>Quiz Completed 🎉</h1>

            <h2 id="score"></h2>

            <p id="correct"></p>

            <p id="wrong"></p>

            <p id="percentage"></p>

            <h3 id="message"></h3>

            <button id="restartBtn">Restart Quiz</button>

        </div>

    </div>

    <script>
        const questions = [

            {
                question: "Which keyword declares a variable?",
                options: ["int", "let", "char", "float"],
                answer: 1
            },

            {
                question: "Which company developed JavaScript?",
                options: ["Microsoft", "Netscape", "Google", "Apple"],
                answer: 1
            },

            {
                question: "Which symbol is used for comments in JavaScript?",
                options: ["//", "/* */", "#", "<!-- -->"],
                answer: 0
            },

            {
                question: "Which method converts a string to an integer?",
                options: ["parseInt()", "toString()", "Number()", "parseFloat()"],
                answer: 0
            },




            {
                question: "Which method displays output in console?",
                options: ["print()", "display()", "console.log()", "echo()"],
                answer: 2
            },

            {
                question: "DOM stands for?",
                options: [
                    "Document Object Model",
                    "Data Object Model",
                    "Document Order Model",
                    "Desktop Object Management"
                ],
                answer: 0
            },

            {
                question: "Which event occurs on button click?",
                options: ["hover", "submit", "click", "load"],
                answer: 2
            },

            {
                question: "Which method selects an element by ID?",
                options: [
                    "querySelectorAll",
                    "getElementById",
                    "getElementsByClass",
                    "getTag"
                ],
                answer: 1
            },

            {
                question: "Which operator checks equality?",
                options: ["=", "==", "===", "!="],
                answer: 2
            },

            {
                question: "Which loop runs at least once?",
                options: ["for", "while", "do...while", "forEach"],
                answer: 2
            },

            {
                question: "Which array method adds an item at the end?",
                options: ["shift", "push", "pop", "slice"],
                answer: 1
            }

        ];

        let currentQuestion = 0;

        let answers = new Array(questions.length).fill(null);

        const welcome = document.getElementById("welcomeScreen");
        const quiz = document.getElementById("quizScreen");
        const result = document.getElementById("resultScreen");

        const question = document.getElementById("question");
        const options = document.getElementById("options");

        const progress = document.getElementById("progress");
        const progressFill = document.getElementById("progressFill");

        const nextBtn = document.getElementById("nextBtn");
        const prevBtn = document.getElementById("prevBtn");
        const submitBtn = document.getElementById("submitBtn");

        document.getElementById("startBtn").addEventListener("click", startQuiz);

        function startQuiz() {

            welcome.classList.add("hide");

            quiz.classList.remove("hide");

            loadQuestion();

        }

        function loadQuestion() {

            let q = questions[currentQuestion];

            question.innerText = q.question;

            options.innerHTML = "";

            progress.innerText = `Question ${currentQuestion + 1} of ${questions.length}`;

            progressFill.style.width = ((currentQuestion + 1) / questions.length) * 100 + "%";

            q.options.forEach((option, index) => {

                let div = document.createElement("div");

                div.className = "option";

                div.innerText = option;

                if (answers[currentQuestion] === index) {

                    div.classList.add("selected");

                }

                div.addEventListener("click", () => {

                    answers[currentQuestion] = index;

                    loadQuestion();

                });

                options.appendChild(div);

            });

            prevBtn.disabled = currentQuestion === 0;

            nextBtn.style.display = currentQuestion === questions.length - 1 ? "none" : "inline-block";

            submitBtn.classList.toggle("hide", currentQuestion !== questions.length - 1);

        }

        nextBtn.addEventListener("click", () => {

            if (currentQuestion < questions.length - 1) {

                currentQuestion++;

                loadQuestion();

            }

        });

        prevBtn.addEventListener("click", () => {

            if (currentQuestion > 0) {

                currentQuestion--;

                loadQuestion();

            }

        });

        submitBtn.addEventListener("click", showResult);

        function showResult() {

            let score = 0;

            answers.forEach((answer, index) => {

                if (answer === questions[index].answer) {

                    score++;

                }

            });

            let wrong = questions.length - score;

            let percentage = (score / questions.length) * 100;

            quiz.classList.add("hide");

            result.classList.remove("hide");

            document.getElementById("score").innerText = `Score : ${score} / ${questions.length}`;

            document.getElementById("correct").innerText = `Correct Answers : ${score}`;

            document.getElementById("wrong").innerText = `Wrong Answers : ${wrong}`;

            document.getElementById("percentage").innerText = `Percentage : ${percentage}%`;

            let msg = "";

            if (percentage >= 90) {

                msg = "Excellent!";

            }

            else if (percentage >= 70) {

                msg = "Great Job!";

            }

            else if (percentage >= 50) {

                msg = "Good Effort!";

            }

            else {

                msg = "Keep Practicing!";

            }

            document.getElementById("message").innerText = msg;

            let highScore = localStorage.getItem("highScore") || 0;

            if (score > highScore) {

                localStorage.setItem("highScore", score);

            }

        }

        document.getElementById("restartBtn").addEventListener("click", () => {

            currentQuestion = 0;

            answers = new Array(questions.length).fill(null);

            result.classList.add("hide");

            welcome.classList.remove("hide");

        });</script>

</body>

</html>
