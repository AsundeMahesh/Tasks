<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Pricing</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #71c557;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: linear-gradient(135deg, #09f935, #fad0c4);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 350px;
        }

        h2 {
            text-align: center;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Movie Ticket Calculator</h2>

        <label>Enter Age:</label>
        <input type="number" id="age">

        <label>Select Showtime:</label>
        <select id="showtime">
            <option value="matinee">Morning</option>
            <option value="evening">Evening</option>
        </select>

        <button onclick="calculateTicket()">Calculate Price</button>

        <div id="result"></div>
    </div>

    <script>
        function calculateTicket() {
            let age = Number(document.getElementById("age").value);
            let showtime = document.getElementById("showtime").value;
            let price;

            // Guard Condition
            if (isNaN(age) || age < 8) {
                document.getElementById("result").innerHTML =
                    "❌ Please enter a valid age.";
            }


            else if (age < 12) {
                price = 5;
                document.getElementById("result").innerHTML =
                    `👦 Child Ticket Price: ${price}`;
            }


            else if (age >= 65) {
                price = 7;
                document.getElementById("result").innerHTML =
                    `👴 Senior Ticket Price: ${price}`;
            }


            else if (showtime === "morning") {
                price = 10;
                document.getElementById("result").innerHTML =
                    `🎬 Adult Morning Ticket Price: ${price}`;
            }


            else {
                price = 15;
                document.getElementById("result").innerHTML =
                    `🌙 Adult Evening Ticket Price: ${price}`;
            }
        }
    </script>

</body>

</html>
